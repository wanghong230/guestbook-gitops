apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook
  labels:
    app.kubernetes.io/name: guestbook
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: guestbook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guestbook
    spec:
      containers:
        - name: guestbook
          # Busybox is the workload itself now — Kargo's Warehouse tracks new
          # busybox tags and promotes them through dev → staging → prod.
          image: docker.io/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - 'while true; do echo "release: $RELEASE_ID"; sleep 10; done'
          env:
            # Default value is overwritten per Stage by the overlay's
            # release-info-patch, which Kargo rewrites on every promotion.
            - name: RELEASE_ID
              value: "unset"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
