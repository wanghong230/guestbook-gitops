# Nominal ClusterIP service. The busybox workload doesn't actually serve HTTP,
# so endpoints will be empty until you swap to a real server image — kept here
# so the GitOps shape (Deployment + Service) is preserved.
apiVersion: v1
kind: Service
metadata:
  name: guestbook
  labels:
    app.kubernetes.io/name: guestbook
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: guestbook
  ports:
    - port: 80
      targetPort: 80
