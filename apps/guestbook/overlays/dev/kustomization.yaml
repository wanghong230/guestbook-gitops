apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: guestbook-dev
commonLabels:
  app.kubernetes.io/instance: guestbook-dev
  env: dev
resources:
- ../../base
patches:
- path: replicas-patch.yaml
  target:
    kind: Deployment
    name: guestbook
- path: release-info-patch.yaml
  target:
    kind: Deployment
    name: guestbook
# Kargo rewrites `newTag` here on each promotion to dev.
images:
- name: docker.io/library/busybox
  newTag: 1.37.0
