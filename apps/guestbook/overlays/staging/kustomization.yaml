apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: guestbook-staging

commonLabels:
  app.kubernetes.io/instance: guestbook-staging
  env: staging

resources:
  - ../../base

patches:
  - path: replicas-patch.yaml
    target:
      kind: Deployment
      name: guestbook

# Kargo rewrites `newTag` here on each promotion to staging.
images:
  - name: quay.io/guestbook
    newTag: latest
