# Placeholder cluster registration secret for the local-nonprod cluster.
# Fill in `server`, `config.bearerToken`, and the cluster CA before applying.
# Argo CD recognizes a Secret with label argocd.argoproj.io/secret-type=cluster.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-local-nonprod
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: local-nonprod
  server: https://REPLACE-WITH-NONPROD-API-SERVER:6443
  config: |
    {
      "bearerToken": "REPLACE_WITH_TOKEN",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "REPLACE_WITH_BASE64_CA_BUNDLE"
      }
    }
