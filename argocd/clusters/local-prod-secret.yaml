# Placeholder cluster registration secret for the local-prod cluster.
# Fill in `server`, `config.bearerToken`, and the cluster CA before applying.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-local-prod
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: local-prod
  server: https://REPLACE-WITH-PROD-API-SERVER:6443
  config: |
    {
      "bearerToken": "REPLACE_WITH_TOKEN",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "REPLACE_WITH_BASE64_CA_BUNDLE"
      }
    }
