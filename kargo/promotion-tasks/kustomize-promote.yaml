# Reusable promotion task for the guestbook app, rendered-manifest flavor.
#
# Two checkouts in one promotion pod:
#   ./src — source manifests + Kustomize bases/overlays from `main` (READ-ONLY
#           in practice; we modify files here only in-memory and never commit
#           ./src back).
#   ./out — the per-stage rendered branch `stage/${{ ctx.stage }}` (created on
#           first promotion). Contains a single `manifests.yaml` produced by
#           `kustomize-build`. This is the ONLY thing we commit and push.
#
# Argo CD watches `stage/${{ ctx.stage }}`, so each environment has its own
# branch and dev/staging/prod promotions are fully decoupled on `main`.
#
# `${{ ctx.stage }}` resolves to "dev"/"staging"/"prod"; the same task runs
# unchanged for all three.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: kustomize-promote
  namespace: guestbook
spec:
  vars:
    - name: gitRepo
      value: https://github.com/wanghong230/guestbook-gitops.git
    - name: imageRepo
      value: mirror.gcr.io/library/busybox
    - name: srcBranch
      value: main
    - name: outBranch
      value: stage/${{ ctx.stage }}
    - name: policyPath
      value: ./src/policies/guestbook-max-replicas.yaml
    - name: tfDir
      value: ./src/terraform/release-marker
    - name: overlayDir
      value: ./src/apps/guestbook/overlays/${{ ctx.stage }}
  steps:
    # 1) Two checkouts. ./out gets `create: true` so the stage branch is
    #    materialized on the first promotion if it doesn't exist yet.
    - uses: git-clone
      config:
        repoURL: ${{ vars.gitRepo }}
        checkout:
          - branch: ${{ vars.srcBranch }}
            path: ./src
          - branch: ${{ vars.outBranch }}
            create: true
            path: ./out

    # 2) Wipe the stage branch's working tree. The next kustomize-build will
    #    write the entire deployable state into it, so this guarantees the
    #    branch contains exactly what we render — nothing leftover.
    - uses: git-clear
      config:
        path: ./out

    # 3) In-memory edit: rewrite the overlay's image tag in ./src.
    - uses: kustomize-set-image
      as: update-image
      config:
        path: ${{ vars.overlayDir }}
        images:
          - image: ${{ vars.imageRepo }}
            tag: ${{ imageFrom(vars.imageRepo).Tag }}

    # 4) Provision (placeholder) cloud resources, capture release_id.
    - uses: tf-apply
      as: provision
      config:
        dir: ${{ vars.tfDir }}
        vars:
          - name: stage
            value: ${{ ctx.stage }}
          - name: image_tag
            value: ${{ imageFrom(vars.imageRepo).Tag }}

    - uses: tf-output
      as: tf-out
      config:
        dir: ${{ vars.tfDir }}

    # 5) In-memory edit: stamp release_id into the overlay's release-info-patch.
    #    main's release-info-patch.yaml stays at its "unset" default forever.
    - uses: yaml-update
      as: stamp-release-id
      config:
        path: ${{ vars.overlayDir }}/release-info-patch.yaml
        updates:
          - key: spec.template.spec.containers.0.env.0.value
            value: ${{ task.outputs['tf-out'].release_id.value }}

    # 6) Render the (in-memory-edited) overlay into ./out/manifests.yaml.
    - uses: kustomize-build
      config:
        path: ${{ vars.overlayDir }}
        outPath: ./out/manifests.yaml

    # 7) Validate the FINAL rendered manifests against the replica caps.
    - uses: kyverno-validate
      as: validate-replicas
      config:
        policy: ${{ vars.policyPath }}
        manifests: ./out/manifests.yaml

    # 8) Commit + push ONLY the rendered output. main is never written.
    - uses: git-commit
      as: commit
      config:
        path: ./out
        message: ${{ task.outputs['update-image'].commitMessage }}

    - uses: git-push
      config:
        path: ./out

    # 9) Tell Argo CD to sync exactly the commit we just pushed.
    - uses: argocd-update
      config:
        apps:
          - name: guestbook-${{ ctx.stage }}
            namespace: argocd
            sources:
              - repoURL: ${{ vars.gitRepo }}
                desiredRevision: ${{ task.outputs.commit.commit }}

    # 10) Stamp release_id onto the Stage so verification.args can read it.
    - uses: set-metadata
      as: stamp-stage
      config:
        updates:
          - kind: Stage
            name: ${{ ctx.stage }}
            values:
              release_id: ${{ task.outputs['tf-out'].release_id.value }}
