# Reusable promotion task for the guestbook app:
#
#   git-clone
#     → kustomize-set-image            (rewrite the overlay's image tag)
#     → tf-apply (release-marker)      (real OpenTofu run; produces release_id)
#     → tf-output                      (capture release_id)
#     → yaml-update                    (write release_id into release-info-patch)
#     → kustomize-build                (render manifests for inspection)
#     → kyverno-validate               (replica-cap policy gate, post-update)
#     → git-commit
#     → git-push
#     → argocd-update
#
# `${{ ctx.stage }}` resolves to the name of the Stage that's invoking the
# task ("dev", "staging", "prod"), driving the overlay path, the policy
# scoping, and the Argo CD Application name.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: kustomize-promote
  namespace: guestbook
spec:
  vars:
    - name: gitRepo
      value: https://github.com/wanghong230/guestbook-gitops.git
    - name: imageRepo
      value: docker.io/library/busybox
    - name: branch
      value: main
    - name: policyPath
      value: ./src/policies/guestbook-max-replicas.yaml
    - name: tfDir
      value: ./src/terraform/release-marker
    - name: overlayDir
      value: ./src/apps/guestbook/overlays/${{ ctx.stage }}
  steps:
    - uses: git-clone
      config:
        repoURL: ${{ vars.gitRepo }}
        checkout:
          - branch: ${{ vars.branch }}
            path: ./src

    - uses: kustomize-set-image
      as: update-image
      config:
        path: ${{ vars.overlayDir }}
        images:
          - image: ${{ vars.imageRepo }}

    # Apply the (placeholder) release-marker module. Today: random_id +
    # terraform_data, no cloud creds. When real resources land, add an `env:`
    # block here that pulls credentials via `secret(...)` expressions.
    - uses: tf-apply
      as: provision
      config:
        dir: ${{ vars.tfDir }}
        vars:
          - name: stage
            value: ${{ ctx.stage }}
          - name: image_tag
            value: ${{ imageFrom(vars.imageRepo).Tag }}
        # env:
        #   - name: AWS_ACCESS_KEY_ID
        #     value: ${{ secret('aws-creds').accessKeyId }}
        #   - name: AWS_SECRET_ACCESS_KEY
        #     value: ${{ secret('aws-creds').secretAccessKey }}

    # Pull declared outputs out of the apply so downstream steps can use them.
    - uses: tf-output
      as: tf-out
      config:
        dir: ${{ vars.tfDir }}
        outputs:
          - release_id

    # Stamp the release_id into the overlay's release-info-patch.yaml so the
    # rendered Deployment carries it as the RELEASE_ID env var on the
    # release-info sidecar. The patch file's shape is stable, so the index
    # path below stays valid.
    - uses: yaml-update
      as: stamp-release-id
      config:
        path: ${{ vars.overlayDir }}/release-info-patch.yaml
        updates:
          - key: spec.template.spec.containers[0].env[0].value
            value: ${{ task.outputs['tf-out'].release_id }}

    # Render the (now updated) overlay so Kyverno sees the final state.
    - uses: kustomize-build
      config:
        path: ${{ vars.overlayDir }}
        outPath: ./rendered.yaml

    # Fail the promotion if the rendered manifests violate the replica caps.
    - uses: kyverno-validate
      as: validate-replicas
      config:
        policy: ${{ vars.policyPath }}
        manifests: ./rendered.yaml

    - uses: git-commit
      as: commit
      config:
        path: ./src
        # Inside a PromotionTask, prior-step outputs are read from `task.outputs`.
        message: ${{ task.outputs['update-image'].commitMessage }}

    - uses: git-push
      config:
        path: ./src

    - uses: argocd-update
      config:
        apps:
          - name: guestbook-${{ ctx.stage }}
            namespace: argocd
            sources:
              - repoURL: ${{ vars.gitRepo }}
                desiredRevision: ${{ task.outputs.commit.commit }}

    # Stamp the promoted release_id onto the Stage so the post-deploy
    # verification (AnalysisTemplate `verify-release-echo`) can pull it back
    # via `${{ stageMetadata(ctx.stage).release_id }}` and assert the
    # running Pods are emitting exactly that value.
    - uses: set-metadata
      as: stamp-stage
      config:
        updates:
          - kind: Stage
            name: ${{ ctx.stage }}
            values:
              release_id: ${{ task.outputs['tf-out'].release_id }}
