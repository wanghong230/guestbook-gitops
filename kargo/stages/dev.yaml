apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: guestbook
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      sources:
        direct: true
  # The promotion logic is shared via the `kustomize-promote` PromotionTask.
  # `${{ ctx.stage }}` inside the task resolves to "dev", picking the right
  # overlay and Argo CD app automatically.
  promotionTemplate:
    spec:
      steps:
        - task:
            name: kustomize-promote
