apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: guestbook
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      sources:
        direct: true
  # The promotion logic is shared via the `kustomize-promote` PromotionTask.
  # `${{ ctx.stage }}` inside the task resolves to "dev", picking the right
  # overlay and Argo CD app automatically.
  promotionTemplate:
    spec:
      steps:
        - task:
            name: kustomize-promote
  # Post-deploy gate: the running Pods must emit the release_id that this
  # promotion stamped onto the Stage. Until this passes, downstream Stages
  # (staging, prod) refuse to accept the Freight.
  verification:
    analysisTemplates:
      - name: verify-release-echo
    args:
      - name: namespace
        value: guestbook-${{ ctx.stage }}
      - name: expected_release_id
        value: ${{ stageMetadata(ctx.stage).release_id }}
