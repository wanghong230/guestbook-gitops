apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: guestbook
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      # Production only accepts freight already verified in `staging`.
      sources:
        stages:
          - staging
  promotionTemplate:
    spec:
      steps:
        - task:
            name: kustomize-promote
