apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: guestbook
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      # Only freight that already passed through `dev` can be promoted here.
      sources:
        stages:
          - dev
  promotionTemplate:
    spec:
      steps:
        - task:
            name: kustomize-promote
