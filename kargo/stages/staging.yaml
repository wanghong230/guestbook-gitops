apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: guestbook
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      # Only freight that already passed through `dev` (and was verified
      # there) can be promoted here.
      sources:
        stages:
          - dev
  promotionTemplate:
    spec:
      steps:
        - task:
            name: kustomize-promote
  verification:
    analysisTemplates:
      - name: verify-release-echo
    args:
      - name: namespace
        value: guestbook-${{ ctx.stage }}
      - name: expected_release_id
        value: ${{ stageMetadata(ctx.stage).release_id }}
