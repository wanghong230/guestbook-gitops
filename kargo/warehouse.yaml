# The Warehouse polls upstream artifact sources (the busybox container image
# and the GitOps repo) and produces Freight that the Stages can promote.
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: guestbook
  namespace: guestbook
spec:
  subscriptions:
    - image:
        repoURL: mirror.gcr.io/library/busybox
        # SemVer captures tags like 1.36, 1.36.1, 1.37 and orders them correctly.
        imageSelectionStrategy: SemVer
        # Strict 3-part semver only — excludes `latest`, `unstable`,
        # `1.36-glibc`, etc. Loosen this if you want to track variant tags.
        allowTags: ^[0-9]+\.[0-9]+\.[0-9]+$
    - git:
        repoURL: https://github.com/wanghong230/guestbook-gitops.git
        branch: main
