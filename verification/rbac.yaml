# RBAC for the AnalysisRun Job spawned by `verify-release-echo`. The Job
# runs in the `akuity` namespace (where the self-hosted Kargo agent
# materializes AnalysisRuns) and inspects workloads in the per-Stage
# namespaces (guestbook-dev, guestbook-staging, guestbook-prod), so it
# needs cluster-wide read access. Hence ClusterRole + ClusterRoleBinding.
#
# Two subjects are bound:
#   - kargo-verify  — the SA we explicitly create for this purpose. Kept for
#                     when/if the AnalysisTemplate's `serviceAccountName`
#                     starts being respected by the Kargo verification
#                     controller.
#   - default        — currently the SA the AnalysisRun pod actually runs as,
#                     because the controller doesn't propagate
#                     `serviceAccountName` from the AnalysisTemplate's pod
#                     template to the spawned Job pod.
#
# If your cluster policy demands per-namespace bindings, replace the single
# ClusterRoleBinding with three RoleBindings (one in each guestbook-*
# namespace).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kargo-verify
  namespace: akuity
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kargo-verify-pod-log-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kargo-verify-pod-log-reader
subjects:
  - kind: ServiceAccount
    name: kargo-verify
    namespace: akuity
  - kind: ServiceAccount
    name: default
    namespace: akuity
roleRef:
  kind: ClusterRole
  name: kargo-verify-pod-log-reader
  apiGroup: rbac.authorization.k8s.io
